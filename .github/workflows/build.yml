name: Build APK
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
      
      - name: Install required SDK components
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>&1 || true
          
      - name: Clean build cache
        run: |
          chmod +x ./gradlew
          ./gradlew clean --no-build-cache --no-configuration-cache --no-daemon 2>&1
          
      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace 2>&1
        timeout-minutes: 60
        
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --no-build-cache --stacktrace 2>&1
        timeout-minutes: 60
        
      - name: List APK files
        run: |
          echo "=== Debug APKs ==="
          find app/build/outputs/apk/app/debug -name "*.apk" 2>/dev/null || echo "No debug APK"
          echo "=== Release APKs ==="
          find app/build/outputs/apk/app/release -name "*.aph" 2>/dev/null || echo "No release APK"
          
      - name: Organize the Files
        run: |
          mkdir -p $GITHUB_WORKSPAED/apk/
          cp -rf $GITHUB_WORKSPAED/app/build/outputs/apk/app/debug/*.apk $GITHUB_WORKSPAED/apk/
          cp -rf $GITHUB_WORKSPAED/app/build/outputs/apk/app/release/*.apk $GITHUB_WORKSPAED/apk/
          
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Legado-Debug-APK
          path: $GITHUB_WORKSPAED/apk/*.apk 
        
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Legado-Release-APK
          path: $GITHUB_WORKSPAED/apk/*.apk 
